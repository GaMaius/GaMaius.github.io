<!DOCTYPE html>
<html lang="ko" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Specs Archive | GARAM</title>
  <meta name="description" content="지우가람(GARAM)의 수상, 출시, 교육 수료 및 대외 활동 전체 목록입니다.">

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">

  <!-- Immediate Theme Loader -->
  <script>
    (function () {
      const savedMode = localStorage.getItem('portfolio-theme-mode') || 'light';
      if (savedMode === 'system') {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      } else {
        document.documentElement.setAttribute('data-theme', savedMode);
      }
    })();
  </script>

  <!-- Load Database and Styles -->
  <script src="data.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Floating 3D Refraction Backdrop Shapes -->
  <div class="floating-shapes-container">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
    <div class="floating-shape shape-4"></div>
  </div>

  <!-- Interactive Particles Canvas Backdrop -->
  <canvas id="bg-canvas"></canvas>

  <!-- ==========================================
       HEADER & NAVIGATION
       ========================================== -->
  <header class="header scrolled" id="header" style="position: sticky;">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <span class="gradient-text">GARAM</span><span class="logo-dot"></span>
      </a>

      <nav class="nav-links" style="display: flex;">
        <a href="index.html" class="nav-link" style="display: flex; align-items: center; gap: 0.3rem;">
          &larr; Back to Portfolio
        </a>
      </nav>

      <div class="nav-actions">
        <!-- 3-State Theme Selector -->
        <div class="theme-selector" id="theme-selector">
          <button id="theme-opt-light" class="theme-opt-btn" title="화이트 모드">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <span>Light</span>
          </button>
          <button id="theme-opt-dark" class="theme-opt-btn" title="블랙 모드">
            <svg viewBox="0 0 24 24">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <span>Dark</span>
          </button>
          <button id="theme-opt-system" class="theme-opt-btn" title="시스템 기준">
            <svg viewBox="0 0 24 24">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <span>Auto</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ==========================================
       ARCHIVE SECTION
       ========================================== -->
  <main class="archive-section" style="padding: 5rem 0 8rem 0; min-height: 75vh;">
    <div class="container">
      <div class="section-title-wrap">
        <span class="section-idx">[ARCHIVE]</span>
        <h1 class="section-title">Specifications Archive</h1>
        <p class="section-subtitle">참여 및 수료한 교육, 수상 경력, 출시 이력의 전체 목록입니다. 항목을 클릭하시면 상세한 활동 및 수행 내용을 확인하실 수 있습니다.</p>
      </div>

      <!-- Table Container -->
      <div class="archive-table-wrapper reveal active" style="margin-top: 3rem;">
        <table class="archive-table" id="specs-archive-table">
          <thead>
            <tr>
              <th style="width: 45%;">내용</th>
              <th style="width: 15%;">분류</th>
              <th style="width: 25%;">기관 / 소속</th>
              <th class="col-period" style="width: 15%;">기간</th>
            </tr>
          </thead>
          <tbody id="specs-archive-body">
            <!-- Dynamically Injected Rows -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- ==========================================
       PROJECT DETAIL MODAL (REUSED FOR SPECS)
       ========================================== -->
  <div class="project-modal" id="project-modal">
    <div class="project-modal-overlay" id="project-modal-overlay"></div>
    <div class="glass-card project-modal-content">
      <button class="project-modal-close" id="project-modal-close" aria-label="닫기">&times;</button>
      <div class="project-modal-body" id="project-modal-body">
        <!-- Dynamically Injected Detail View -->
      </div>
    </div>
  </div>

  <!-- ==========================================
       FOOTER
       ========================================== -->
  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-logo">
        GARAM<span class="logo-dot"></span>
      </div>
      <div class="footer-socials">
        <a href="https://github.com/GaMaius" class="social-icon" target="_blank" rel="noopener noreferrer"
          aria-label="Github 링크">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
          </svg>
        </a>
      </div>
      <p class="footer-copy">&copy; 2026 GARAM. All rights reserved.</p>
    </div>
  </footer>

  <!-- Specs Table Loader and Theme Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Load Data
      const data = window.PORTFOLIO_DATA;
      if (!data || !data.specs) {
        console.error("Failed to load portfolio database.");
        return;
      }

      const projectModal = document.getElementById('project-modal');
      const projectModalBody = document.getElementById('project-modal-body');
      const projectModalClose = document.getElementById('project-modal-close');
      const projectModalOverlay = document.getElementById('project-modal-overlay');

      function closeProjectModal() {
        if (!projectModal) return;
        projectModal.classList.remove('open');
        document.body.style.overflow = '';
      }

      if (projectModalClose) {
        projectModalClose.addEventListener('click', closeProjectModal);
      }
      if (projectModalOverlay) {
        projectModalOverlay.addEventListener('click', closeProjectModal);
      }
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && projectModal && projectModal.classList.contains('open')) {
          closeProjectModal();
        }
      });

      function openSpecModal(spec) {
        if (!projectModal || !projectModalBody) return;

        const tagsMarkup = (spec.tags || [])
          .map(tag => `<span class="project-tag">${tag}</span>`)
          .join('');

        projectModalBody.innerHTML = `
          <div class="modal-header-icon" style="font-size: 3rem; margin-bottom: 1rem;">
            ${spec.type === 'launch' ? '🚀' : spec.type === 'award' ? '🏆' : spec.type === 'education' ? '🎓' : '💼'}
          </div>
          <h2 class="modal-project-title font-display">${spec.title}</h2>
          <div class="modal-project-platform" style="margin-bottom: 1.8rem;">
            <span class="specs-badge ${spec.type}" style="display:inline-block; vertical-align:middle; margin-right:0.5rem;">${spec.badgeText}</span>
            <span style="font-weight: 600; font-size: 0.95rem; color: var(--text-primary); vertical-align:middle;">${spec.institution || ''}</span>
          </div>
          
          <div class="project-meta-grid" style="margin-bottom: 2rem;">
            <div class="project-meta-label">기간</div>
            <div class="project-meta-value">${spec.date || ''}</div>
            <div class="project-meta-label">기관 / 소속</div>
            <div class="project-meta-value">${spec.institution || ''}</div>
          </div>
          
          <h3 class="modal-desc-title">이력 개요</h3>
          <p class="modal-desc-text">${spec.desc || ''}</p>
          
          ${spec.details ? `
            <h3 class="modal-desc-title">수행 내용</h3>
            <p class="modal-desc-text" style="white-space: pre-wrap; margin-bottom: 2.2rem; line-height: 1.7;">${spec.details}</p>
          ` : ''}
          
          ${spec.tags && spec.tags.length > 0 ? `
            <h3 class="modal-desc-title" style="margin-bottom: 0.8rem;">관련 기술 스택</h3>
            <div class="project-tags" style="margin-bottom: 2.2rem;">
              ${tagsMarkup}
            </div>
          ` : ''}
          
          ${spec.result ? `
            <div style="background: rgba(var(--accent-rgb), 0.05); border: 1px solid rgba(var(--accent-rgb), 0.2); border-radius: var(--radius-sm); padding: 1.2rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.8rem;">
              <span style="font-size: 1.6rem; line-height: 1;">🏆</span>
              <div>
                <div style="font-size: 0.7rem; font-family: var(--font-mono); text-transform: uppercase; color: var(--accent-primary); font-weight:600;">결과 및 성과 (Result)</div>
                <div style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary); margin-top: 0.15rem;">${spec.result}</div>
              </div>
            </div>
          ` : ''}

          ${spec.link ? `
            <div class="project-links" style="padding-top: 1.5rem; border-top: 1px dashed var(--border-color); margin-top: 2rem;">
              <a href="${spec.link}" class="btn btn-primary" target="_blank" rel="noopener noreferrer" style="font-size:0.8rem; padding: 0.6rem 1.4rem;">
                관련 링크 바로가기 &rarr;
              </a>
            </div>
          ` : ''}
        `;

        projectModal.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      // 2. Render Specs Archive Table
      const specsBody = document.getElementById('specs-archive-body');
      if (specsBody) {
        specsBody.innerHTML = '';
        const sortedSpecs = [...data.specs].sort((a, b) => (a.priority ?? 99) - (b.priority ?? 99));
        sortedSpecs.forEach(spec => {
          const row = document.createElement('tr');
          row.className = 'archive-row';
          row.style.cursor = 'pointer';

          row.innerHTML = `
            <td style="font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">${spec.title}</td>
            <td><span class="specs-badge ${spec.type}">${spec.badgeText}</span></td>
            <td style="font-weight: 600; color: var(--text-secondary); font-size: 0.9rem;">${spec.institution || ''}</td>
            <td class="col-period mono">${spec.date}</td>
          `;

          // Add click listener
          row.addEventListener('click', () => {
            openSpecModal(spec);
          });

          specsBody.appendChild(row);
        });
      }

      // 3. Theme Toggle Manager
      const themeButtons = {
        light: document.getElementById('theme-opt-light'),
        dark: document.getElementById('theme-opt-dark'),
        system: document.getElementById('theme-opt-system')
      };

      const systemMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

      function applySystemTheme() {
        const isDark = systemMediaQuery.matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      }

      function setThemeMode(mode) {
        Object.values(themeButtons).forEach(btn => {
          if (btn) btn.classList.remove('active');
        });

        if (themeButtons[mode]) {
          themeButtons[mode].classList.add('active');
        }

        if (mode === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        } else if (mode === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          applySystemTheme();
        }

        localStorage.setItem('portfolio-theme-mode', mode);
      }

      Object.keys(themeButtons).forEach(mode => {
        const btn = themeButtons[mode];
        if (btn) {
          btn.addEventListener('click', () => setThemeMode(mode));
        }
      });

      systemMediaQuery.addEventListener('change', () => {
        const currentMode = localStorage.getItem('portfolio-theme-mode') || 'system';
        if (currentMode === 'system') {
          applySystemTheme();
        }
      });

      const savedMode = localStorage.getItem('portfolio-theme-mode') || 'system';
      setThemeMode(savedMode);
    });
  </script>
  <!-- Interactive Particles Canvas -->
  <script src="canvas-bg.js"></script>
</body>

</html>
