  <!-- ==========================================
       CONTACT SECTION
       ========================================== -->
  <section class="contact subpage-section" id="contact">
    <div class="container">
      <h2 class="section-title">Get In Touch</h2>
      <p class="section-subtitle">프로젝트 협업 제안이나 기타 문의사항이 있으시면 언제든지 메시지를 남겨주세요.</p>
      
      <div class="grid grid-2 contact-grid">
        <!-- Contact Information Info Cards -->
        <div class="contact-info-list reveal">
          <div class="glass-card contact-card">
            <div style="display: flex; flex-direction: column; gap: 2rem;">
              
              <!-- Card 1: Email -->
              <div class="contact-info-item">
                <div class="contact-info-icon">
                  <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </div>
                <div class="contact-info-details">
                  <h4>Email</h4>
                  <p><a href="mailto:rkfka@naver.com">rkfka@naver.com</a></p>
                </div>
              </div>
              
              <!-- Card 2: Github -->
              <div class="contact-info-item">
                <div class="contact-info-icon">
                  <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                </div>
                <div class="contact-info-details">
                  <h4>GitHub</h4>
                  <p><a href="https://github.com/GaMaius" target="_blank" rel="noopener noreferrer">github.com/GaMaius</a></p>
                </div>
              </div>
              
              <!-- Card 3: Location -->
              <div class="contact-info-item">
                <div class="contact-info-icon">
                  <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                </div>
                <div class="contact-info-details">
                  <h4>Location</h4>
                  <p>Seoul, South Korea</p>
                </div>
              </div>
              
            </div>
          </div>
        </div>
        
        <!-- Contact Form Box -->
        <div class="reveal reveal-delay-2">
          <div class="glass-card contact-form-card">
            <form id="contact-form">
              <div class="form-group">
                <label for="name" class="form-label">이름</label>
                <input type="text" id="name" name="name" class="form-input" placeholder="이름을 입력해 주세요" required>
              </div>
              <div class="form-group">
                <label for="email" class="form-label">이메일</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="이메일 주소를 입력해 주세요" required>
              </div>
              <div class="form-group">
                <label for="message" class="form-label">메시지</label>
                <textarea id="message" name="message" class="form-input" placeholder="메시지 내용을 입력해 주세요" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary form-submit-btn">보내기</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
