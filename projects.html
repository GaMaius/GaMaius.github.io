<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Project Archive | GaMaius</title>
  <meta name="description" content="GaMaius의 전체 프로젝트 아카이브 리스트입니다.">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">

  <!-- Immediate Theme Loader -->
  <script>
    (function() {
      const savedMode = localStorage.getItem('portfolio-theme-mode') || 'system';
      if (savedMode === 'system') {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      } else {
        document.documentElement.setAttribute('data-theme', savedMode);
      }
    })();
  </script>

  <!-- Load Database and Styles -->
  <script src="data.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ==========================================
       HEADER & NAVIGATION
       ========================================== -->
  <header class="header scrolled" id="header" style="position: sticky;">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        GAMAiUS<span class="logo-dot"></span>
      </a>

      <nav class="nav-links" style="display: flex;">
        <a href="index.html" class="nav-link" style="display: flex; align-items: center; gap: 0.3rem;">
          &larr; Back to Portfolio
        </a>
      </nav>

      <div class="nav-actions">
        <!-- 3-State Theme Selector -->
        <div class="theme-selector" id="theme-selector">
          <button id="theme-opt-light" class="theme-opt-btn" title="화이트 모드">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <span>Light</span>
          </button>
          <button id="theme-opt-dark" class="theme-opt-btn" title="블랙 모드">
            <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <span>Dark</span>
          </button>
          <button id="theme-opt-system" class="theme-opt-btn" title="시스템 기준">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            <span>Auto</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ==========================================
       ARCHIVE SECTION
       ========================================== -->
  <main class="archive-section" style="padding: 5rem 0 8rem 0; min-height: 75vh;">
    <div class="container">
      <div class="section-title-wrap">
        <span class="section-idx">[ARCHIVE]</span>
        <h1 class="section-title">Project Archive</h1>
        <p class="section-subtitle">현재까지 진행한 게임 개발, 웹 솔루션, AI 연구 프로젝트의 전체 목록입니다.</p>
      </div>

      <!-- Table Container -->
      <div class="archive-table-wrapper reveal active" style="margin-top: 3rem;">
        <table class="archive-table" id="archive-table-element">
          <thead>
            <tr>
              <th class="col-period">기간 (Period)</th>
              <th class="col-title">프로젝트명 (Title)</th>
              <th class="col-category">분야 (Category)</th>
              <th class="col-team">인원 및 역할 (Team / Role)</th>
              <th class="col-tech">사용 스택 (Tech Stack)</th>
              <th class="col-links">링크 (Links)</th>
            </tr>
          </thead>
          <tbody id="archive-table-body">
            <!-- Dynamically Injected Rows -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- ==========================================
       FOOTER
       ========================================== -->
  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-logo">
        GAMAiUS<span class="logo-dot"></span>
      </div>
      <div class="footer-socials">
        <a href="https://github.com/GaMaius" class="social-icon" target="_blank" rel="noopener noreferrer" aria-label="Github 링크">
          <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </div>
      <p class="footer-copy">&copy; 2026 GaMaius. All rights reserved.</p>
    </div>
  </footer>

  <!-- Table Loader and Theme Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Load Data
      const data = window.PORTFOLIO_DATA;
      if (!data || !data.projects) {
        console.error("Failed to load portfolio database.");
        return;
      }

      // 2. Render Archive Table
      const tableBody = document.getElementById('archive-table-body');
      if (tableBody) {
        tableBody.innerHTML = '';
        data.projects.forEach(project => {
          const row = document.createElement('tr');
          row.className = 'archive-row';
          
          // Map tags
          const tagsMarkup = project.tags
            .map(tag => `<span class="project-tag mono">${tag}</span>`)
            .join(' ');

          // Map Category Display Text
          let catLabel = project.category.toUpperCase();
          if (project.category === 'game') catLabel = '🎮 Game Dev';
          if (project.category === 'web') catLabel = '🌐 Web';
          if (project.category === 'ai') catLabel = '🧠 AI Dev';

          row.innerHTML = `
            <td class="col-period mono">${project.period.split(' ')[0] || project.period}</td>
            <td class="col-title font-display" style="font-weight: 700;">
              <span style="font-size: 1.1rem; color: var(--text-primary);">${project.title}</span>
            </td>
            <td class="col-category"><span class="project-placeholder-platform" style="font-size:0.7rem;">${catLabel}</span></td>
            <td class="col-team">
              <div style="font-weight: 500; font-size: 0.9rem; color: var(--text-primary);">${project.role}</div>
              <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem;">${project.team}</div>
            </td>
            <td class="col-tech">${tagsMarkup}</td>
            <td class="col-links">
              <a href="${project.github}" class="project-link" target="_blank" rel="noopener noreferrer" style="color: var(--accent-primary); font-size: 0.85rem; font-family: var(--font-mono);">
                GitHub &rarr;
              </a>
            </td>
          `;
          tableBody.appendChild(row);
        });
      }

      // 3. Theme Toggle Manager
      const themeButtons = {
        light: document.getElementById('theme-opt-light'),
        dark: document.getElementById('theme-opt-dark'),
        system: document.getElementById('theme-opt-system')
      };
      
      const systemMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      
      function applySystemTheme() {
        const isDark = systemMediaQuery.matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      }

      function setThemeMode(mode) {
        Object.values(themeButtons).forEach(btn => {
          if (btn) btn.classList.remove('active');
        });

        if (themeButtons[mode]) {
          themeButtons[mode].classList.add('active');
        }

        if (mode === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        } else if (mode === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          applySystemTheme();
        }

        localStorage.setItem('portfolio-theme-mode', mode);
      }

      Object.keys(themeButtons).forEach(mode => {
        const btn = themeButtons[mode];
        if (btn) {
          btn.addEventListener('click', () => setThemeMode(mode));
        }
      });

      systemMediaQuery.addEventListener('change', () => {
        const currentMode = localStorage.getItem('portfolio-theme-mode') || 'system';
        if (currentMode === 'system') {
          applySystemTheme();
        }
      });

      const savedMode = localStorage.getItem('portfolio-theme-mode') || 'system';
      setThemeMode(savedMode);
    });
  </script>
</body>
</html>
