<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Project Archive | GARAM</title>
  <meta name="description" content="지우가람(GARAM)의 전체 프로젝트 아카이브 리스트입니다.">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
 
  <!-- Immediate Theme Loader -->
  <script>
    (function() {
      const savedMode = localStorage.getItem('portfolio-theme-mode') || 'light';
      if (savedMode === 'system') {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      } else {
        document.documentElement.setAttribute('data-theme', savedMode);
      }
    })();
  </script>

  <!-- Load Database and Styles -->
  <script src="data.js"></script>
  <link rel="stylesheet" href="styles.css?v=3.0">
</head>
<body>

  <!-- Floating 3D Refraction Backdrop Shapes -->
  <div class="floating-shapes-container">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
    <div class="floating-shape shape-4"></div>
  </div>

  <!-- Interactive Particles Canvas Backdrop -->
  <canvas id="bg-canvas"></canvas>

  <!-- ==========================================
       HEADER & NAVIGATION
       ========================================== -->
  <header class="header scrolled" id="header" style="position: sticky;">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <span class="gradient-text">GARAM</span><span class="logo-dot"></span>
      </a>

      <nav class="nav-links" style="display: flex;">
        <a href="index.html" class="nav-link" style="display: flex; align-items: center; gap: 0.3rem;">
          &larr; Back to Portfolio
        </a>
      </nav>

      <div class="nav-actions">
        <!-- 3-State Theme Selector -->
        <div class="theme-selector" id="theme-selector">
          <button id="theme-opt-light" class="theme-opt-btn" title="화이트 모드">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <span>Light</span>
          </button>
          <button id="theme-opt-dark" class="theme-opt-btn" title="블랙 모드">
            <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <span>Dark</span>
          </button>
          <button id="theme-opt-system" class="theme-opt-btn" title="시스템 기준">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            <span>Auto</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ==========================================
       ARCHIVE SECTION
       ========================================== -->
  <main class="archive-section" style="padding: 5rem 0 8rem 0; min-height: 75vh;">
    <!-- Negative Space BG Typography -->
    <div class="section-bg-text font-display">DEVS</div>
    <div class="container">
      <div class="section-title-wrap">
        <span class="section-idx">[ARCHIVE]</span>
        <h1 class="section-title">Project Archive</h1>
        <p class="section-subtitle">현재까지 진행한 게임 개발, 웹 솔루션, AI 연구 프로젝트의 전체 목록입니다.</p>
      </div>

      <!-- Filter Button Tabs -->
      <div class="project-filters reveal active" style="margin-top: 2rem;">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="game">Game Dev</button>
        <button class="filter-btn" data-filter="web">Web</button>
        <button class="filter-btn" data-filter="ai">AI Dev</button>
      </div>

      <!-- Grid Container -->
      <div class="projects-grid reveal active" id="projects-list-container" style="margin-top: 3rem;">
        <!-- Dynamically Injected Cards -->
      </div>
    </div>
  </main>

  <!-- ==========================================
       FOOTER
       ========================================== -->
  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-logo">
        GARAM<span class="logo-dot"></span>
      </div>
      <div class="footer-socials">
        <a href="https://github.com/GaMaius" class="social-icon" target="_blank" rel="noopener noreferrer" aria-label="Github 링크">
          <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        </a>
      </div>
      <p class="footer-copy">&copy; 2026 GARAM. All rights reserved.</p>
    </div>
  </footer>

  <!-- Project Detail Modal -->
  <div class="project-modal" id="project-modal">
    <div class="project-modal-overlay" id="project-modal-overlay"></div>
    <div class="glass-card project-modal-content">
      <button class="project-modal-close" id="project-modal-close" aria-label="닫기">&times;</button>
      <div class="project-modal-body" id="project-modal-body">
        <!-- Injected details -->
      </div>
    </div>
  </div>

  <!-- Card Loader and Theme Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Load Data
      const data = window.PORTFOLIO_DATA;
      if (!data || !data.projects) {
        console.error("Failed to load portfolio database.");
        return;
      }

      // 2. Render Project Cards Grid
      const projectsContainer = document.getElementById('projects-list-container');
      if (projectsContainer) {
        projectsContainer.innerHTML = '';
        
        // Sort projects by priority ascending
        const sortedProjects = [...data.projects].sort((a, b) => (a.priority ?? 99) - (b.priority ?? 99));

        sortedProjects.forEach((project) => {
          const projCard = document.createElement('div');
          projCard.className = 'project-card-wrapper glass-card reveal active';
          projCard.dataset.category = project.category;

          const tagsMarkup = project.tags
            .map(tag => `<span class="project-tag">${tag}</span>`)
            .join('');

          projCard.innerHTML = `
            <div class="project-card">
              <div class="project-img-wrapper">
                <div class="project-img-placeholder">
                  <span class="project-placeholder-icon">${project.icon || '📁'}</span>
                  <span class="project-placeholder-platform">${project.platformLabel || ''}</span>
                </div>
              </div>
              <div class="project-content">
                <div class="project-tags">${tagsMarkup}</div>
                <h3 class="project-title">${project.title}</h3>
                <p class="project-desc">${project.desc.length > 100 ? project.desc.substring(0, 95) + '...' : project.desc}</p>
                <div class="project-links" style="margin-top: auto;">
                  <span class="project-link" style="color: var(--accent-primary); font-weight:600; cursor:pointer;">
                    자세히 보기 &rarr;
                  </span>
                </div>
              </div>
            </div>
          `;

          // Open Modal on Card Click
          projCard.addEventListener('click', () => {
            openProjectModal(project);
          });

          projectsContainer.appendChild(projCard);
        });
      }

      // 3. Project Detail Modal Control
      const projectModal = document.getElementById('project-modal');
      const projectModalBody = document.getElementById('project-modal-body');
      const projectModalClose = document.getElementById('project-modal-close');
      const projectModalOverlay = document.getElementById('project-modal-overlay');

      function closeProjectModal() {
        if (!projectModal) return;
        projectModal.classList.remove('open');
        document.body.style.overflow = '';
      }

      if (projectModalClose) {
        projectModalClose.addEventListener('click', closeProjectModal);
      }
      if (projectModalOverlay) {
        projectModalOverlay.addEventListener('click', closeProjectModal);
      }
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && projectModal && projectModal.classList.contains('open')) {
          closeProjectModal();
        }
      });

      function openProjectModal(project) {
        if (!projectModal || !projectModalBody) return;

        const tagsMarkup = (project.tags || [])
          .map(tag => `<span class="project-tag">${tag}</span>`)
          .join('');

        const categoryMap = {
          game: { text: "게임", badgeClass: "launch" },
          web: { text: "웹", badgeClass: "education" },
          ai: { text: "인공지능", badgeClass: "award" }
        };
        const cat = categoryMap[project.category] || { text: "프로젝트", badgeClass: "internship" };

        projectModalBody.innerHTML = `
          <div class="modal-header-icon" style="font-size: 3rem; margin-bottom: 1rem;">${project.icon || '📁'}</div>
          <h2 class="modal-project-title font-display">${project.title}</h2>
          <div class="modal-project-platform" style="margin-bottom: 1.8rem;">
            <span class="specs-badge ${cat.badgeClass}" style="display:inline-block; vertical-align:middle; margin-right:0.5rem;">${cat.text}</span>
            <span style="font-weight: 600; font-size: 0.95rem; color: var(--text-primary); vertical-align:middle;">${project.platformLabel || ''}</span>
          </div>
          
          <div class="project-meta-grid" style="margin-bottom: 2rem;">
            <div class="project-meta-label">개발 기간</div>
            <div class="project-meta-value">${project.period || ''}</div>
            <div class="project-meta-label">인원 구성</div>
            <div class="project-meta-value">${project.team || ''}</div>
            <div class="project-meta-label">본인 역할</div>
            <div class="project-meta-value">${project.role || ''}</div>
          </div>
          
          <h3 class="modal-desc-title">프로젝트 개요</h3>
          <p class="modal-desc-text">${project.desc || ''}</p>
          
          ${project.details ? `
            <h3 class="modal-desc-title">수행 내용</h3>
            <p class="modal-desc-text" style="white-space: pre-wrap; margin-bottom: 2.2rem; line-height: 1.7;">${project.details}</p>
          ` : ''}
          
          ${project.image ? (() => {
            const imgs = Array.isArray(project.image) ? project.image : [project.image];
            const imgsMarkup = imgs.map(img => `
              <div class="modal-image-wrapper">
                <img src="${img}" alt="${project.title}" class="modal-image">
              </div>
            `).join('');
            return `
              <div class="modal-images-grid ${imgs.length > 1 ? 'multi' : ''}">
                ${imgsMarkup}
              </div>
            `;
          })() : ''}
          
          ${project.tags && project.tags.length > 0 ? `
            <h3 class="modal-desc-title" style="margin-bottom: 0.8rem;">관련 기술 스택</h3>
            <div class="project-tags" style="margin-bottom: 2.2rem;">
              ${tagsMarkup}
            </div>
          ` : ''}
          
          ${project.result ? `
            <div style="background: rgba(var(--accent-rgb), 0.05); border: 1px solid rgba(var(--accent-rgb), 0.2); border-radius: var(--radius-sm); padding: 1.2rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.8rem;">
              <span style="font-size: 1.6rem; line-height: 1;">🏆</span>
              <div>
                <div style="font-size: 0.7rem; font-family: var(--font-mono); text-transform: uppercase; color: var(--accent-primary); font-weight:600;">결과 및 성과</div>
                <div style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary); margin-top: 0.15rem;">${project.result}</div>
              </div>
            </div>
          ` : ''}

          ${project.github ? `
            <div class="project-links" style="padding-top: 1.5rem; border-top: 1px dashed var(--border-color); margin-top: 2rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
              <a href="${project.github}" class="btn btn-primary" target="_blank" rel="noopener noreferrer" style="font-size:0.8rem; padding: 0.6rem 1.4rem; display: inline-flex; align-items: center; gap: 0.4rem;">
                ${(() => {
                  const isGithub = project.github && project.github.includes('github.com');
                  const label = isGithub ? 'GitHub Repository' : '관련 링크 바로가기';
                  const icon = isGithub
                    ? `<svg viewBox="0 0 24 24" style="width: 14px; height: 14px; fill: currentColor;"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>`
                    : '🔗';
                  return `${icon} ${label}`;
                })()}
              </a>
            </div>
          ` : ''}
        `;

        projectModal.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      // 4. Image Lightbox Control
      document.addEventListener('click', (e) => {
        const wrapper = e.target.closest('.modal-image-wrapper');
        if (wrapper) {
          const img = wrapper.querySelector('.modal-image');
          if (img) {
            const src = img.getAttribute('src');
            const alt = img.getAttribute('alt') || 'Image Preview';

            const overlay = document.createElement('div');
            overlay.className = 'lightbox-overlay';
            overlay.innerHTML = `
              <span class="lightbox-close">&times;</span>
              <div class="lightbox-content">
                <img class="lightbox-img" src="${src}" alt="${alt}">
              </div>
              <div class="lightbox-toolbar">
                <button class="lightbox-btn zoom-out" title="Zoom Out">
                  <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
                </button>
                <button class="lightbox-btn zoom-reset" title="Reset Zoom">
                  <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                </button>
                <button class="lightbox-btn zoom-in" title="Zoom In">
                  <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
              </div>
            `;

            document.body.appendChild(overlay);

            // Force reflow
            overlay.offsetHeight;
            overlay.classList.add('active');

            const lightboxImg = overlay.querySelector('.lightbox-img');
            const zoomInBtn = overlay.querySelector('.zoom-in');
            const zoomOutBtn = overlay.querySelector('.zoom-out');
            const resetBtn = overlay.querySelector('.zoom-reset');

            let scale = 1;
            let panX = 0;
            let panY = 0;
            let isDragging = false;
            let startX = 0;
            let startY = 0;
            let hasMoved = false;

            const updateTransform = () => {
              scale = Math.min(Math.max(scale, 0.8), 5.0);
              lightboxImg.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${scale})`;
            };

            // ZOOM VIA WHEEL
            overlay.addEventListener('wheel', (ev) => {
              ev.preventDefault();
              const zoomFactor = 0.1;
              const direction = ev.deltaY < 0 ? 1 : -1;
              
              scale += direction * zoomFactor * scale;
              scale = Math.min(Math.max(scale, 0.8), 5.0);
              updateTransform();
            }, { passive: false });

            // DRAG AND PAN
            const startDrag = (clientX, clientY) => {
              isDragging = true;
              hasMoved = false;
              startX = clientX - panX;
              startY = clientY - panY;
              lightboxImg.classList.add('dragging');
            };

            const moveDrag = (clientX, clientY) => {
              if (!isDragging) return;
              const newPanX = clientX - startX;
              const newPanY = clientY - startY;

              if (Math.abs(newPanX - panX) > 3 || Math.abs(newPanY - panY) > 3) {
                hasMoved = true;
              }

              panX = newPanX;
              panY = newPanY;
              updateTransform();
            };

            const stopDrag = () => {
              if (!isDragging) return;
              isDragging = false;
              lightboxImg.classList.remove('dragging');
            };

            // Mouse Events
            lightboxImg.addEventListener('mousedown', (ev) => {
              ev.preventDefault();
              startDrag(ev.clientX, ev.clientY);
            });

            const handleMouseMove = (ev) => {
              moveDrag(ev.clientX, ev.clientY);
            };
            const handleMouseUp = () => {
              stopDrag();
            };

            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);

            // Touch Events (Mobile)
            lightboxImg.addEventListener('touchstart', (ev) => {
              if (ev.touches.length === 1) {
                startDrag(ev.touches[0].clientX, ev.touches[0].clientY);
              }
            });

            const handleTouchMove = (ev) => {
              if (ev.touches.length === 1) {
                moveDrag(ev.touches[0].clientX, ev.touches[0].clientY);
              }
            };
            const handleTouchEnd = () => {
              stopDrag();
            };

            window.addEventListener('touchmove', handleTouchMove, { passive: true });
            window.addEventListener('touchend', handleTouchEnd);

            // TOOLBAR BUTTONS
            zoomInBtn.addEventListener('click', (ev) => {
              ev.stopPropagation();
              scale *= 1.25;
              updateTransform();
            });

            zoomOutBtn.addEventListener('click', (ev) => {
              ev.stopPropagation();
              scale /= 1.25;
              updateTransform();
            });

            resetBtn.addEventListener('click', (ev) => {
              ev.stopPropagation();
              scale = 1;
              panX = 0;
              panY = 0;
              updateTransform();
            });

            // CLOSE SYSTEM
            const closeLightbox = () => {
              overlay.classList.remove('active');
              window.removeEventListener('mousemove', handleMouseMove);
              window.removeEventListener('mouseup', handleMouseUp);
              window.removeEventListener('touchmove', handleTouchMove);
              window.removeEventListener('touchend', handleTouchEnd);
              document.removeEventListener('keydown', escHandler);
              setTimeout(() => {
                overlay.remove();
              }, 300);
            };

            const escHandler = (ev) => {
              if (ev.key === 'Escape') {
                closeLightbox();
              }
            };
            document.addEventListener('keydown', escHandler);

            // Click overlay to close
            overlay.addEventListener('click', (ev) => {
              if (ev.target.classList.contains('lightbox-close')) {
                closeLightbox();
                return;
              }
              if (ev.target === overlay || ev.target.classList.contains('lightbox-content')) {
                if (!hasMoved) {
                  closeLightbox();
                }
              }
            });
          }
        }
      });

      // 5. Theme Toggle Manager
      const themeButtons = {
        light: document.getElementById('theme-opt-light'),
        dark: document.getElementById('theme-opt-dark'),
        system: document.getElementById('theme-opt-system')
      };
      
      const systemMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      
      function applySystemTheme() {
        const isDark = systemMediaQuery.matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      }

      function setThemeMode(mode) {
        Object.values(themeButtons).forEach(btn => {
          if (btn) btn.classList.remove('active');
        });

        if (themeButtons[mode]) {
          themeButtons[mode].classList.add('active');
        }

        if (mode === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        } else if (mode === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          applySystemTheme();
        }

        localStorage.setItem('portfolio-theme-mode', mode);
      }

      Object.keys(themeButtons).forEach(mode => {
        const btn = themeButtons[mode];
        if (btn) {
          btn.addEventListener('click', () => setThemeMode(mode));
        }
      });

      systemMediaQuery.addEventListener('change', () => {
        const currentMode = localStorage.getItem('portfolio-theme-mode') || 'system';
        if (currentMode === 'system') {
          applySystemTheme();
        }
      });

      const savedMode = localStorage.getItem('portfolio-theme-mode') || 'system';
      setThemeMode(savedMode);

      // 6. Projects Category Filter
      const filterButtons = document.querySelectorAll('.filter-btn');
      filterButtons.forEach(button => {
        button.addEventListener('click', () => {
          filterButtons.forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');

          const filterValue = button.getAttribute('data-filter');
          const projectCards = document.querySelectorAll('.project-card-wrapper');

          projectCards.forEach(card => {
            const cardCategory = card.getAttribute('data-category');

            if (filterValue === 'all' || cardCategory === filterValue) {
              card.style.display = 'block';
              setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'scale(1)';
              }, 50);
            } else {
              card.style.opacity = '0';
              card.style.transform = 'scale(0.8)';
              setTimeout(() => {
                card.style.display = 'none';
              }, 300);
            }
          });
        });
      });
    });
  </script>
  <!-- Interactive Particles Canvas -->
  <script src="canvas-bg.js"></script>
</body>
</html>
